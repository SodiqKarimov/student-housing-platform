version: '3.8'

services:
  # PostgreSQL ma'lumotlar bazasi
  postgres:
    image: postgres:16-alpine
    container_name: housing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-housing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecurePass123!}
      POSTGRES_DB: ${POSTGRES_DB:-student_housing_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-housing_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - housing_network

  # Redis (session va cache uchun)
  redis:
    image: redis:7-alpine
    container_name: housing_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisPass123!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - housing_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: housing_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-housing_user}:${POSTGRES_PASSWORD:-SecurePass123!}@postgres:5432/${POSTGRES_DB:-student_housing_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisPass123!}@redis:6379
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - housing_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: housing_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - housing_network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: housing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - housing_network

volumes:
  postgres_data:
  redis_data:

networks:
  housing_network:
    driver: bridge
