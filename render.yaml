services:
  - type: web
    name: student-housing-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PROVIDER
        value: sqlite
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        value: render_encrypt_key_32chars_here!!
      - key: ENCRYPTION_IV
        value: render_iv_16chars
      - key: USE_MOCK
        value: "true"
      - key: ALLOWED_ORIGINS
        value: https://your-netlify-app.netlify.app,http://localhost:3000
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: AUDIT_LOG_RETENTION_DAYS
        value: "365"
