name: Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

jobs:
  # ==========================================
  # Testlar o'tgandan keyin deploy
  # ==========================================
  deploy-backend:
    name: Backend Deploy (Render.com)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Render.com ga deploy trigger
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            --fail --silent --show-error
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Deploy status tekshirish
        run: echo "✅ Backend deploy trigger yuborildi. Render.com dashboard dan kuzating."

  deploy-frontend:
    name: Frontend Deploy (Netlify)
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend dependencylar
        working-directory: ./frontend
        run: npm ci --prefer-offline || npm install

      - name: Frontend build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Netlify ga deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy: ${{ github.sha }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
