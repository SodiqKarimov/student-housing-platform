name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================
  # Backend testlari
  # ==========================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DATABASE_URL: file:./test.db
      JWT_SECRET: test-jwt-secret-for-ci-only
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci
      ENCRYPTION_KEY: test-encryption-key-32-characters!!
      PORT: 5001

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Backend dependencylarni o'rnatish
        working-directory: ./backend
        run: npm ci --prefer-offline || npm install

      - name: Prisma client generate
        working-directory: ./backend
        run: npx prisma generate

      - name: Testlarni ishga tushirish
        working-directory: ./backend
        run: npm test

      - name: Test coverage hisoboti
        working-directory: ./backend
        run: npm run test:coverage
        continue-on-error: true

  # ==========================================
  # Frontend build tekshirish
  # ==========================================
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependencylarni o'rnatish
        working-directory: ./frontend
        run: npm ci --prefer-offline || npm install

      - name: Frontend build qilish
        working-directory: ./frontend
        env:
          VITE_API_URL: /api/v1
        run: npm run build

      - name: Build artifacts saqlash
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ==========================================
  # Xavfsizlik skanerlash
  # ==========================================
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend npm audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Frontend npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true
